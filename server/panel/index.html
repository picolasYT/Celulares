<!DOCTYPE html>
<html>
<head>

<title>Picolas Control</title>

<style>

body{
font-family: Arial;
background:#0f0f0f;
color:white;
padding:30px;
}

h1{
margin-bottom:30px;
}

.device{
background:#1b1b1b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:8px;
width:250px;
background:#222;
border:none;
color:white;
}

button{
padding:8px 14px;
background:#ff7a18;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
}

button:hover{
opacity:0.8;
}

#terminal{
background:black;
padding:15px;
height:300px;
overflow-y:auto;
font-family:monospace;
border-radius:8px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>⚡ Picolas Control</h1>

<div class="device">

<h3 id="deviceName">celular</h3>

<input id="commandInput" placeholder="comando">

<button onclick="sendCommand()">
ejecutar
</button>

</div>

<h2>Terminal</h2>

<div id="terminal"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let currentDevice = "celular2";

function sendCommand(){

const input = document.getElementById("commandInput");

const cmd = input.value;

if(!cmd) return;

socket.emit("execute",{
device: currentDevice,
cmd: cmd
});

input.value="";

}

socket.on("terminal-output",(data)=>{

const term = document.getElementById("terminal");

term.innerHTML += `<div>> ${data.output}</div>`;

term.scrollTop = term.scrollHeight;

});

</script>

</body>
</html>
