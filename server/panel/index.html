<!DOCTYPE html>
<html>

<head>
<title>Picolas Control</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
padding:20px;
}

.device{
background:#222;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
padding:8px;
margin:5px;
}

#terminal{
background:black;
padding:10px;
height:200px;
overflow:auto;
}

</style>

</head>

<body>

<h1>⚡ Picolas Control</h1>

<div id="devices"></div>

<h2>Terminal</h2>
<div id="terminal"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

async function loadDevices(){

const res = await fetch("/devices");
const devices = await res.json();

const container = document.getElementById("devices");
container.innerHTML="";

devices.forEach(d=>{

const div = document.createElement("div");
div.className="device";

div.innerHTML=`
<h3>${d}</h3>

<input id="cmd-${d}" placeholder="comando">

<button onclick="send('${d}')">
ejecutar
</button>
`;

container.appendChild(div);

});

}

function send(device){

const cmd = document.getElementById("cmd-"+device).value;

fetch(`/exec/${device}/${cmd}`);

}

socket.on("terminal-output",(data)=>{

const term = document.getElementById("terminal");

term.innerHTML += `<pre>${data.output}</pre>`;

});

setInterval(loadDevices,2000);

</script>

</body>
</html>
